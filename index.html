<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELK MASTER — Elektrik Uzmanlık Akademisi</title>
<style>
  :root{
    --bg:#0b0e13; --bg2:#0e131b; --panel:#141b25; --panel2:#1b2430; --line:#26313f;
    --txt:#e8eef6; --muted:#8a98ab; --acc:#ffb000; --acc2:#33b1ff; --acc3:#a371ff;
    --ok:#3fb950; --bad:#f85149; --warn:#d29922;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;
    background:radial-gradient(1400px 700px at 85% -15%,#16202e 0,transparent 55%),
    radial-gradient(1000px 600px at 0% 110%,#15131f 0,transparent 50%),var(--bg);
    color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:var(--acc2)}
  .hidden{display:none!important}
  /* HEADER */
  header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;
    padding:12px 20px;background:rgba(13,17,24,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer}
  .logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,#ffb000,#ff7a00);color:#1a1200;font-weight:900;box-shadow:0 4px 14px #ff8a0033}
  .brand h1{font-size:16px;margin:0;letter-spacing:.5px}
  .brand .sub{font-size:10.5px;color:var(--muted);letter-spacing:.5px}
  nav.main{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
  nav.main button{background:transparent;border:none;color:var(--muted);font-size:13.5px;font-weight:600;
    padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s}
  nav.main button:hover{color:var(--txt);background:#ffffff0a}
  nav.main button.active{color:var(--acc);background:#ffb00014}
  .hstats{margin-left:auto;display:flex;gap:14px;align-items:center;font-size:12.5px;color:var(--muted)}
  .hstats b{color:var(--acc)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#0e1520;border:1px solid var(--line);
    padding:6px 11px;border-radius:20px}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 20px 60px}
  /* GENERIC */
  .btn{background:var(--acc);color:#1a1200;border:none;padding:11px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;transition:.15s}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--acc)}
  .btn.blue{background:var(--acc2);color:#001626}
  .btn.purple{background:var(--acc3);color:#fff}
  .btn.danger{background:var(--bad);color:#fff}
  .btn.sm{padding:7px 13px;font-size:12.5px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .panel2{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .muted{color:var(--muted)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:14px}
  .sectiontitle{display:flex;align-items:center;gap:10px;margin:26px 0 12px}
  .sectiontitle h2{margin:0;font-size:19px}
  .sectiontitle .ln{flex:1;height:1px;background:var(--line)}
  /* PROGRESS RING */
  .ring{transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:11}
  .ring .bg{stroke:#1d2733}
  /* DASHBOARD */
  .hero{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
  @media(max-width:680px){.hero{grid-template-columns:1fr}}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
  .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .kpi .v{font-size:24px;font-weight:800;color:var(--acc)}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  /* CARDS */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;
    position:relative;overflow:hidden;transition:.15s}
  .card:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 10px 28px #0007}
  .card .ico{font-size:24px}
  .card h3{margin:8px 0 5px;font-size:14.5px}
  .card p{margin:0;font-size:12px;color:var(--muted);line-height:1.5;min-height:34px}
  .card .cat{font-size:10px;color:var(--acc2);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .mini{height:6px;background:#0c1219;border-radius:5px;overflow:hidden;margin-top:10px;border:1px solid var(--line)}
  .mini > i{display:block;height:100%;background:linear-gradient(90deg,#f85149,#d29922,#3fb950);transition:.5s}
  .cardbadge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
  .cardbadge.done{background:#0d2a3a;color:var(--acc2);border:1px solid #1c4a63}
  .cardbadge.due{background:#3a2a0d;color:var(--warn);border:1px solid #63501c}
  /* TABS */
  .tabbar{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin:14px 0 18px}
  .tabbar button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);
    font-size:13.5px;font-weight:700;padding:10px 14px;cursor:pointer}
  .tabbar button.active{color:var(--acc);border-bottom-color:var(--acc)}
  .breadcrumb{font-size:12.5px;color:var(--muted);cursor:pointer;display:inline-block;margin-bottom:6px}
  .breadcrumb:hover{color:var(--acc)}
  /* CONTENT BLOCKS */
  .edu{border-left:4px solid var(--acc2);background:#0f1b27;border-radius:10px;padding:16px;line-height:1.85;font-size:13px;color:#cdd7e2}
  .edu b{color:#eaf2fb}
  .foy{border-left:4px solid var(--ok);background:#0e1c12;border-radius:10px;padding:16px;line-height:1.9;font-size:13px;color:#d4e2d6}
  .foy summary{cursor:pointer;font-weight:800;color:var(--ok);font-size:14px}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px}
  input[type=range]{width:100%}
  input[type=number],input[type=text],select,textarea{background:#0c1219;color:var(--txt);border:1px solid var(--line);
    border-radius:9px;padding:10px;font-size:14px;font-family:inherit;width:100%}
  textarea{min-height:150px;resize:vertical;line-height:1.6}
  .inline{width:auto;display:inline-block}
  /* QUIZ */
  .q{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0}
  .q .qtxt{font-weight:700;font-size:14px;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;background:#0c1219;border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:11px 13px;margin:7px 0;cursor:pointer;font-size:13.5px;transition:.12s}
  .opt:hover{border-color:var(--acc2)}
  .opt.sel{border-color:var(--acc);background:#241d07}
  .opt.correct{border-color:var(--ok);background:#0f2a16;color:#bdf0c8}
  .opt.wrong{border-color:var(--bad);background:#2a1212;color:#f6b9b6}
  .expl{margin-top:10px;font-size:12.5px;line-height:1.7;color:#cdd7e2;border-left:3px solid var(--acc2);padding:8px 12px;background:#0f1b27;border-radius:8px;display:none}
  .expl.show{display:block}
  .pill{padding:8px 13px;border:1px solid var(--line);border-radius:9px;background:#0c1219;cursor:pointer;user-select:none;font-size:13px}
  .pill:hover{border-color:var(--acc2)}
  .pill.sel{border-color:var(--acc);background:#241d07}
  .msg{padding:12px 14px;border-radius:10px;margin-top:14px;font-size:14px;font-weight:600;display:none}
  .msg.ok{background:#0f2a16;color:#bdf0c8;border:1px solid #1e5631;display:block}
  .msg.bad{background:#2a1212;color:#f6b9b6;border:1px solid #5a1e1e;display:block}
  .msg.info{background:#0d2230;color:#bfe3fb;border:1px solid #1c4a63;display:block}
  .scorebar{height:11px;background:#0c1219;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .scorebar > i{display:block;height:100%;background:linear-gradient(90deg,#f85149,#d29922,#3fb950);transition:.5s}
  .lamp{width:52px;height:52px;border-radius:50%;background:#2a2a2a;border:3px solid #444;display:grid;place-items:center;font-size:11px;color:#000;transition:.2s}
  .lamp.on{background:radial-gradient(circle at 40% 35%,#fff6c2,#ffd400 60%,#b58a00);box-shadow:0 0 22px #ffd40099;border-color:#caa400}
  .lamp.dead{background:#1a1a1a;border-color:#600;color:#f55}
  .wirebox{display:flex;flex-direction:column;gap:6px}
  .wire{display:flex;align-items:center;gap:10px;background:#0c1219;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .wire .sw{width:30px;height:14px;border-radius:3px;border:1px solid #0008}
  .kc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .kc .k{background:#0c1219;border:1px solid var(--line);border-radius:10px;padding:11px}
  .kc .k span{font-size:11px;color:var(--muted)} .kc .k b{display:block;font-size:18px;margin-top:3px}
  /* BADGES */
  .badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
  .badge{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;opacity:.4;filter:grayscale(1)}
  .badge.on{opacity:1;filter:none;border-color:var(--acc)}
  .badge .bi{font-size:30px} .badge .bn{font-size:12px;font-weight:700;margin-top:6px} .badge .bd{font-size:10.5px;color:var(--muted);margin-top:3px}
  /* EXAM */
  .examtimer{font-variant-numeric:tabular-nums;font-size:26px;font-weight:800;color:var(--acc2)}
  .cert{background:linear-gradient(160deg,#11161f,#0c1118);border:2px solid var(--acc);border-radius:16px;padding:34px;text-align:center;position:relative}
  .cert .seal{font-size:46px}
  .cert h2{margin:10px 0 4px;font-size:26px;letter-spacing:1px}
  .cert .nm{font-size:30px;font-weight:800;color:var(--acc);margin:14px 0}
  .cert .line{height:1px;background:var(--line);margin:16px 0}
  footer{padding:24px;text-align:center;color:var(--muted);font-size:11.5px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1b2430;border:1px solid var(--line);
    padding:12px 18px;border-radius:11px;z-index:99;font-size:13px;box-shadow:0 8px 24px #0008}
  @media print{ header.top,footer,nav.main,.breadcrumb,.tabbar,.hstats{display:none!important} body *{visibility:hidden} #cert,#cert *{visibility:visible} #cert{position:absolute;left:0;top:0;width:100%;border:none;box-shadow:none} #cert button{display:none} }

  /* fasikül & şekil & cila */
  .lessonhead{display:flex;gap:14px;align-items:center;background:linear-gradient(100deg,#141b25,#0f1620);border:1px solid var(--line);border-left:5px solid var(--acc2);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .lessonhead .lh-ic{font-size:34px;filter:drop-shadow(0 3px 8px #0008)}
  .lh-cat{font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:800}
  .lh-t{font-size:17px;font-weight:800;margin-top:2px}
  .fig{margin:0 0 14px;background:radial-gradient(circle at 30% 0%,#16202e,#0e141d);border:1px solid var(--line);border-radius:12px;padding:16px}
  .fig svg{width:100%;height:auto;max-height:230px;display:block}
  .fig figcaption{text-align:center;font-size:11.5px;color:var(--muted);margin-top:10px;font-style:italic}
  .brand h1{background:linear-gradient(90deg,#ffd27a,#ffb000);-webkit-background-clip:text;background-clip:text;color:transparent}
  .card::after{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:linear-gradient(90deg,var(--acc),transparent);opacity:0;transition:.2s}
  .card:hover::after{opacity:1}
  @keyframes pop{from{transform:scale(.97);opacity:.6}to{transform:scale(1);opacity:1}}
  #app>*{animation:pop .18s ease}

  /* ===== CANLI / HAVALI GÖRSEL CİLA v6 ===== */
  body::before{content:"";position:fixed;inset:-10%;z-index:-1;pointer-events:none;
    background:radial-gradient(600px 420px at 14% 18%,#1b6fff26,transparent 60%),
    radial-gradient(720px 520px at 86% 12%,#ff8a0022,transparent 60%),
    radial-gradient(640px 520px at 72% 92%,#a371ff22,transparent 60%);
    animation:drift 20s ease-in-out infinite alternate;filter:blur(6px)}
  @keyframes drift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(0,-26px,0) scale(1.08)}}
  header.top::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;
    background:linear-gradient(90deg,transparent,#33b1ff,#ffb000,#a371ff,transparent);
    background-size:220% 100%;animation:slide 7s linear infinite}
  @keyframes slide{to{background-position:220% 0}}
  .logo{animation:pulse 2.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 4px 14px #ff8a0033}50%{box-shadow:0 6px 26px #ffb00099,0 0 0 4px #ffb0001a}}
  nav.main button.active{box-shadow:inset 0 -2px 0 #ffb000;text-shadow:0 0 12px #ffb00088}
  .chip{box-shadow:inset 0 0 0 1px #ffffff0a}
  .btn{background:linear-gradient(135deg,#ffc23d,#ff8a00);box-shadow:0 6px 18px #ff8a0033}
  .btn.blue{background:linear-gradient(135deg,#5ec6ff,#1b8fe0);box-shadow:0 6px 18px #1b8fe033}
  .btn.purple{background:linear-gradient(135deg,#bd93ff,#7c4dff);box-shadow:0 6px 18px #7c4dff44}
  .btn.danger{background:linear-gradient(135deg,#ff6b63,#e23b32);box-shadow:0 6px 18px #e23b3233}
  .btn.ghost{background:#ffffff05}
  .btn:active{transform:translateY(1px) scale(.99)}
  .card{background:linear-gradient(180deg,#171d28,#11161f)}
  .card:hover{box-shadow:0 16px 36px #0009,0 0 0 1px var(--acc)}
  .card .ico{transition:.22s;display:inline-block}
  .card:hover .ico{transform:scale(1.18) rotate(-5deg)}
  .kpi .v{background:linear-gradient(90deg,#ffd27a,#ffb000);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ring{filter:drop-shadow(0 0 10px #ffb00055)}
  .sectiontitle .ln{background:linear-gradient(90deg,var(--line),transparent)}
  .fig{box-shadow:inset 0 0 50px #33b1ff14}
  .lessonhead{box-shadow:0 8px 22px #0006}
  .opt{transition:.15s}
  .opt:hover{transform:translateX(3px)}
  .opt.correct{box-shadow:0 0 0 1px #3fb95066,0 0 16px #3fb95033}
  .opt.wrong{box-shadow:0 0 0 1px #f8514966}
  .badge.on{box-shadow:0 0 20px #ffb00033}
  .badge.on .bi{display:inline-block;animation:float 3.2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .examtimer{text-shadow:0 0 14px #33b1ff66}
  .scorebar>i{box-shadow:0 0 12px #3fb95055}
  .cert{box-shadow:0 0 40px #ffb00022,inset 0 0 60px #ffb0000a}
  .cert .seal{animation:float 3s ease-in-out infinite;display:inline-block}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-track{background:#0c1219}
  ::-webkit-scrollbar-thumb{background:#283441;border-radius:7px;border:2px solid #0c1219}
  ::-webkit-scrollbar-thumb:hover{background:#33b1ff}
  .panel{position:relative;overflow:hidden}
  .panel::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,#33b1ff,#a371ff);opacity:.35}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  /* ===== PANO ATÖLYESİ ===== */
  .panowrap{background:linear-gradient(#0c1219,#0a0f16);border:1px solid var(--line);border-radius:14px;padding:18px;overflow-x:auto}
  .panoboard{background:linear-gradient(#eef1f4,#e3e7ec);border-radius:10px;padding:18px 14px 16px;position:relative;box-shadow:inset 0 0 0 1px #0002,0 6px 20px #0006;min-width:520px}
  .rail{position:absolute;left:14px;right:14px;top:50px;height:30px;background:linear-gradient(#dfe4e9,#b3bbc4 45%,#9aa3ad 55%,#cfd6dd);border-radius:3px;box-shadow:inset 0 1px 0 #fff,inset 0 -1px 0 #0003}
  .modrow{display:flex;gap:5px;position:relative;z-index:2;align-items:flex-start}
  .brk{width:34px;background:linear-gradient(#ffffff,#eceff2);border:1px solid #c2c8cf;border-radius:4px;padding:6px 0;text-align:center;cursor:pointer;position:relative;box-shadow:0 2px 5px #0003;user-select:none;transition:.12s}
  .brk:hover{box-shadow:0 4px 10px #0004;transform:translateY(-1px)}
  .brk.wide{width:60px}.brk.rcd{width:90px}
  .brk .scr{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fbfcfd,#aab2bb);margin:2px auto;position:relative;box-shadow:inset 0 0 0 1px #0002}
  .brk .scr::after{content:"";position:absolute;left:2px;top:4px;width:7px;height:2px;background:#5b636c;transform:rotate(35deg)}
  .brk .lever{width:16px;height:22px;margin:5px auto;border-radius:3px;background:#23262b;position:relative;transition:.18s;box-shadow:inset 0 -3px 0 #0006}
  .brk.on .lever{background:linear-gradient(#ff5b50,#d12c23)}
  .brk.on .lever::after{content:"I";color:#fff;font-size:11px;font-weight:800;position:absolute;left:0;right:0;top:3px}
  .brk .lever::before{content:"O";color:#777;font-size:10px;font-weight:800;position:absolute;left:0;right:0;bottom:1px}
  .brk.on .lever::before{color:#ffffff88}
  .brk .lbl{font-size:8px;color:#2a2f36;line-height:1.15;font-weight:800;margin-top:3px}
  .brk .testbtn{position:absolute;top:6px;right:5px;width:14px;height:14px;border-radius:3px;background:#f0c000;color:#3a2c00;font-size:9px;font-weight:800;line-height:14px}
  .vprot{width:74px;background:linear-gradient(#fafbfc,#e9edf1);border:1px solid #c2c8cf;border-radius:4px;padding:6px 4px;text-align:center;box-shadow:0 2px 5px #0003}
  .vp-screen{background:#0a0a0a;border-radius:3px;padding:4px 2px;margin:2px auto;box-shadow:inset 0 0 6px #000}
  .vp-v{display:block;color:#ff3b30;font-family:"Courier New",monospace;font-weight:800;font-size:16px;letter-spacing:1px;text-shadow:0 0 6px #ff3b3066}
  .vp-a{display:block;color:#28d05a;font-family:"Courier New",monospace;font-weight:800;font-size:13px;text-shadow:0 0 6px #28d05a55}
  .vp-lbl{font-size:8px;color:#2a2f36;font-weight:800;margin-top:3px}
  .busbar{height:10px;margin:6px 4px 0;background:repeating-linear-gradient(90deg,#cdd3da 0 10px,#b7bec6 10px 20px);border-radius:2px;box-shadow:inset 0 1px 0 #fff}
  .outrow{display:flex;gap:5px}
  .sp64{width:60px}.sp74{width:74px}.sp92{width:90px}
  .outcol{width:34px;text-align:center}
  .outwire{height:44px;width:5px;margin:0 auto;background:#9aa2ab;border-radius:3px;position:relative;overflow:hidden}
  .outwire.live{background:#e23b32;box-shadow:0 0 8px #e23b3266}
  .outwire.live::after{content:"";position:absolute;left:0;right:0;top:-12px;bottom:-12px;background:repeating-linear-gradient(180deg,#ffffffcc 0 5px,transparent 5px 14px);animation:panoflow .55s linear infinite}
  @keyframes panoflow{to{transform:translateY(14px)}}
  .outlbl{font-size:8px;color:#2a2f36;margin-top:4px;font-weight:700}
</style>
</head>
<body>
<header class="top">
  <div class="brand" onclick="go('home')">
    <div class="logo">⚡</div>
    <div><h1>ELK MASTER</h1><div class="sub">Elektrik Uzmanlık Akademisi · DHMİ</div></div>
  </div>
  <nav class="main" id="nav">
    <button data-v="home" onclick="go('home')">Pano</button>
    <button data-v="modules" onclick="go('modules')">Modüller</button>
    <button data-v="exam" onclick="go('exam')">Deneme Sınavı</button>
    <button data-v="myk" onclick="go('myk')">🎖️ MYK Sınavı</button>
    <button data-v="review" onclick="go('review')">Tekrar</button>
    <button data-v="glossary" onclick="go('glossary')">Sözlük</button>
    <button data-v="settings" onclick="go('settings')">⚙️ Veri</button>
  </nav>
  <div class="hstats">
    <span class="chip">🔥 <b id="hsStreak">0</b> gün</span>
    <span class="chip">⭐ <b id="hsXp">0</b> XP</span>
  </div>
</header>
<div class="wrap" id="app"></div>
<footer>ELK MASTER v5.0 · Teori + Uygulama + Föy + Sınav + Tekrar · İlerlemen bu cihazda saklanır.</footer>
<script>
/* ===================== VERİ KATMANI ===================== */
const RULES = {

const FOY = {
1:`<b>Özet:</b> Ohm yasası devrenin temelidir: <b>V = I × R</b>.<br><b>Güç:</b> P = V·I = I²·R = V²/R. Örnek: V=12 V, R=6 Ω → I=2 A, P=24 W.<br><b>Seri:</b> R<sub>top</sub>=R1+R2+… · akım aynı · gerilim bölünür · biri kopar→tümü söner.<br><b>Paralel:</b> 1/R<sub>top</sub>=1/R1+1/R2+… · gerilim aynı · akım bölünür · biri arızalansa diğerleri çalışır.<br><b>Sık hata:</b> Ampermetreyi paralel bağlamak kısa devre yapar.`,
2:`<b>Özet:</b> İyi ek = düşük temas direnci; gevşek ek ısınır→yangın.<br><b>Soyma:</b> düz/T ek 50 mm, F konnektör 15 mm.<br><b>T568B:</b> Tu-Beyaz·Turuncu·Ye-Beyaz·Mavi·Mavi-Beyaz·Yeşil·Ka-Beyaz·Kahverengi.<br><b>İpucu:</b> İki uç da B → düz kablo; A-B → çapraz. Çift büküm EMI bastırır.<br><b>Yank testi:</b> her teli çek, oynayan varsa yeniden yap.`,
3:`<b>Özet:</b> Kablo ortama+mekanik şarta göre seçilir.<br>• NYA: tek tel, sabit pano/boru · • NYAF: çok tel, esnek, motor · • NYM: nemli sıva altı · • NYY: yer altı.<br><b>Harf:</b> N=standart, Y=PVC, A=tek tel, F=ince çok tel, M=antigron.<br><b>Kesit:</b> akıma göre; ince kesit+yüksek akım = ısınma+gerilim düşümü.`,
4:`<b>Özet:</b> Doğru bağlantı = doğru ölçüm.<br><b>Ampermetre:</b> SERİ, düşük iç direnç (≈0–1 Ω); paralelde kısa devre.<br><b>Voltmetre:</b> PARALEL, yüksek iç direnç.<br><b>Ohmmetre:</b> devre enerjisiz; büyük dirençte iki probu birden elleme.<br><b>Pens:</b> tek hat (faz); faz+nötr=0 A.`,
5:`<b>Özet:</b> Otomatik aydınlatma LDR+kontaktör.<br><b>LDR:</b> karanlıkta yüksek dirençli, ışığı okur.<br><b>Kontaktör:</b> bobin (A1-A2) + ana kontaklar; küçük sinyalle büyük yük.<br><b>Çalışma:</b> karanlık→bobin enerjilenir→kontak kapanır→lamba yanar.<br><b>Hata:</b> mantığı ters kurmak (gündüz yakmak).`,
6:`<b>Özet:</b> Üç zamanlı sayaç.<br>T1 (06–17) orta · T2 (17–22) EN PAHALI · T3 (22–06) EN UCUZ.<br><b>Yük kaydırma:</b> fırın/pompa/ısıtıcı gece (T3).<br><b>Reaktif:</b> düşük cosφ → ceza → kompanzasyon panosu (kondansatör).<br><b>Pratik:</b> zaman saatli programlı çalıştırma.`,
7:`<b>Özet (ölümcül kural):</b> Kesici yük akımını keser; Ayırıcı yük altında AÇILMAZ.<br><b>Açma:</b> önce KESİCİ → sonra AYIRICI. <b>Kapama:</b> tersi.<br><b>5 altın kural:</b> 1) enerjiyi kes 2) tekrar kapanmayı önle (kilit/etiket) 3) gerilimsizliği doğrula 4) toprakla+kısa devre et 5) komşu gerilimli kısımları yalıt.`,
8:`<b>Özet:</b> Şef işçilik+işi takip eder.<br><b>Adam-saat = işçi × saat.</b> Örn. 10×9 = 90.<br><b>Metraj:</b> yapılan işin ölçümü.<br><b>Hakediş = metraj × birim fiyat.</b> Örn. 250 m × 40 TL = 10.000 TL.<br><b>Belge:</b> puantaj, yeşil defter (metraj), hakediş raporu.`,
9:`<b>Özet:</b> Kritik tesiste kesinti kabul edilmez.<br><b>ATS:</b> şebeke↔jeneratör otomatik geçiş.<br><b>UPS:</b> jeneratör gelene kadar kesintisiz köprü (online ≈0 geçiş).<br><b>CAT II/III:</b> pist ışıkları kritik; transfer ≤ 1 sn yoksa pas geçilir.<br><b>Kademe:</b> şebeke→UPS (anlık)→jeneratör (saniyeler).`,
10:`<b>Özet:</b> YG'de aşırı gerilim + topraklama kritik.<br><b>Parafudur:</b> aşırı gerilimi toprağa akıtır.<br><b>Topraklama:</b> düşük direnç şart; ≥1 Ω parafuduru etkisizleştirir → hedef R&lt;1 Ω (bakır kazık, eşpotansiyel, bentonit).<br><b>İkaz küreleri:</b> hava hattında uçak/helikopter uyarısı.`,
11:`<b>Özet:</b> AC işaret ve ölçümü.<br><b>Tanım:</b> saykıl, periyot T, <b>f=1/T</b>. T=20 ms→f=50 Hz.<br><b>Osiloskop:</b> TEPE değeri okutur; <b>Vrms=Vmax/√2</b>, Vpp=2·Vmax.<br><b>PCB dağlama:</b> 1 Perhidrol + 3 Tuz Ruhu, 5–10 dk. Az süre→bakır kalır, çok süre→yol aşınır.`,
12:`<b>Büyüklük / Birim / Alet:</b><br>I→Amper→Ampermetre · V→Volt→Voltmetre · R→Ohm(Ω)→Ohmmetre · f→Hertz→Frekansmetre · P→Watt→Wattmetre · Q→Var→Varmetre · L→Henry→LCRmetre · C→Farad→LCRmetre · cosφ→Kosinüsfimetre.`,
13:`<b>Mutlak:</b> ΔX=|Xg−X|. <b>Bağıl:</b> ε=ΔX/Xg×100.<br>Örn. Xg=220, X=216 → ΔX=4, ε=%1,82.<br><b>Alet sınıfı:</b> tam skalaya göre izinli maks. hata (örn. 1,5 → ±%1,5).<br><b>İpucu:</b> bağıl hata ölçümün kalitesini daha iyi anlatır.`,
14:`<b>X<sub>L</sub> = 2πfL.</b> Frekans artarsa XL artar.<br><b>DA:</b> f=0 → XL=0 → bobin kısa devre.<br><b>Kapasitif:</b> X<sub>C</sub>=1/(2πfC); DA'da XC→∞ (açık devre).<br><b>İpucu:</b> bobin DA'yı geçirir/AC'yi zorlar; kondansatör tersi.`,
15:`<b>Sıra:</b> Oksidasyon temizliği (½" kes) → soyma → krimp → lehim (sadece ucu ısıt) → makaron.<br><b>Yeşil alev:</b> bakır oksitlendi, DUR.<br><b>Flux:</b> abartma — asidik, kalırsa korozyon.<br><b>Makaron:</b> kötü bağlantıyı gizlemek için DEĞİL, koruma için.`,
16:`• Titreşimde stranded zorunlu.<br>• Ringing (yüzük) iletkeni zayıflatır.<br>• Nox: bakır-nikel-çinko korozyonunu önler.<br>• Shed water: yüksük yukarı baksın.<br>• Saat yönü büküm → sıkı bağlantı.<br>• Yank testi: her teli çek.`,
17:`• ~ AC · — DC · ikisi birlikte = DC+AC.<br>• ⊥ dik · ⊓ yatay · ∠60° eğik kullanım.<br>• Yıldız+rakam = yalıtkanlık deneyi kV'si; içi boş 5 köşeli yıldız = 500 V muayene.<br>• Üçgen içinde (!) = dikkat, dokümana bak.`,
18:`<b>Güç üçgeni:</b> S²=P²+Q².<br>Tek faz P=V·I·cosφ. Üç faz: S=√3·U·I, P=√3·U·I·cosφ, Q=√3·U·I·sinφ.<br>Örn. U=380, I=10, cosφ=1 → P=1,732·380·10=6.581 W≈6,58 kW.<br><b>cosφ=P/S;</b> düşükse fazla akım çekilir (kayıp+ceza) → kompanzasyon.`,
19:`<b>ADP:</b> binanın elektrik kalbi.<br><b>Hiyerarşi:</b> giriş→Ana pano→tali→kat/mahal panoları.<br><b>İçi:</b> ana şalter, bara, sigorta/otomat, kontaktör, SPD, ölçü, kompanzasyon, topraklama barası.<br><b>IP:</b> 1. rakam toz, 2. rakam su (örn. IP54).<br><b>Pratik:</b> etiketleme, faz dengesi, kısa devre dayanımı (Icw).`,

22:`<b>Koruma:</b> armatür IP65/67, kablo UV dayanımlı; topraklama Sınıf I veya çift yalıtım Sınıf II.<br><b>Besleme:</b> NYY yer altı, ~60 cm + ikaz bandı.<br><b>Kumanda:</b> fotosel + zaman saati.<br><b>Güvenlik:</b> ıslak/dekoratifte 12/24 V.<br><b>Armatür:</b> projektör, gömme spot, bollard, RGB.`,
23:`• <b>İnşaat:</b> beton ÖNCESİ sleeve/ankraj bırak.<br>• <b>Mekanik:</b> tava↔kanal çakışması (clash) önle, kot paylaş.<br>• <b>Mimari:</b> armatür/priz tavan planına uyar.<br>• <b>IT:</b> veri kabloları güçten ayrı tava/mesafe (EMI).<br>• <b>Asansör/yangın:</b> ayrı besleme.<br>• <b>Araç:</b> ortak galeri/şaft + BIM clash detection + koordinasyon toplantısı.`,

/* ===================== KALICILIK + SRS + ROZET ===================== */
const SKEY='elkmaster_v5';
let MEM=null;
function _read(){ try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){return MEM||{};} }
function _write(o){ try{localStorage.setItem(SKEY,JSON.stringify(o));}catch(e){MEM=o;} }
let DB=_read();
DB.scores=DB.scores||{};
DB.notes=DB.notes||{};
DB.srs=DB.srs||{};
DB.exams=DB.exams||[];
DB.days=DB.days||[];
DB.name=DB.name||'';
DB.xp=DB.xp||0;
function persist(){ _write(DB); }

function todayStr(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
function markToday(){ const t=todayStr(); if(!DB.days.includes(t)){ DB.days.push(t); persist(); } }
function streak(){
  if(!DB.days.length) return 0;
  const set=new Set(DB.days); let s=0; const d=new Date();
  while(true){ d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
    const k=d.toISOString().slice(0,10);
    if(set.has(k)){ s++; d.setDate(d.getDate()-1); d.setMinutes(d.getMinutes()+d.getTimezoneOffset()); }
    else break;
  }
  return s;
}
function addXp(n){ DB.xp=(DB.xp||0)+n; persist(); refreshHeader(); }

function setScore(id,pct){ pct=Math.round(pct); if(!(DB.scores[id]>=pct)) DB.scores[id]=pct; markToday(); persist(); refreshHeader(); }
function moduleDone(){ return Object.keys(DB.scores).length; }
function moduleProgressPct(){ return Math.round(moduleDone()/MODS.length*100); }
function avgScore(){ const v=Object.values(DB.scores); return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0; }
function totalQuestions(){ let n=0; for(const k in QBANK) n+=QBANK[k].length; return n; }

/* SRS — Leitner kutuları */
const SRS_INT=[1,2,4,7,15,30];
function srsAnswer(qid,correct){
  let s=DB.srs[qid]||{box:0,due:todayStr()};
  s.box = correct ? Math.min(SRS_INT.length-1,(s.box||0)+1) : 0;
  const days = correct ? SRS_INT[s.box] : 1;
  const d=new Date(); d.setDate(d.getDate()+days); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  s.due=d.toISOString().slice(0,10);
  DB.srs[qid]=s; persist();
}
function dueReviews(){ const t=todayStr(); const out=[]; for(const qid in DB.srs){ if(DB.srs[qid].due<=t) out.push(qid); } return out; }
function parseQid(qid){ const p=qid.split('.'); return {mod:+p[0], idx:+p[1]}; }

/* ROZETLER */
const BADGES=[
 {id:'first',ic:'🌱',n:'İlk Adım',d:'1 modül tamamla',f:()=>moduleDone()>=1},
 {id:'cirak',ic:'🔧',n:'Çırak',d:'5 modül tamamla',f:()=>moduleDone()>=5},
 {id:'kalfa',ic:'🛠️',n:'Kalfa',d:'12 modül tamamla',f:()=>moduleDone()>=12},
 {id:'usta',ic:'🏅',n:'Usta',d:'Tüm 23 modül',f:()=>moduleDone()>=23},
 {id:'mukemmel',ic:'💯',n:'Mükemmeliyet',d:'5 modülde 100 puan',f:()=>Object.values(DB.scores).filter(x=>x>=100).length>=5},
 {id:'sinav',ic:'🎓',n:'Sınav Şampiyonu',d:'Sınavdan ≥90',f:()=>DB.exams.some(e=>e.pct>=90)},
 {id:'streak7',ic:'🔥',n:'7 Gün Seri',d:'7 gün üst üste',f:()=>streak()>=7},
 {id:'streak30',ic:'⚡',n:'Azimli',d:'30 gün seri',f:()=>streak()>=30},
];
function earnedBadges(){ return BADGES.filter(b=>{try{return b.f();}catch(e){return false;}}); }

function refreshHeader(){
  const s=document.getElementById('hsStreak'); if(s) s.textContent=streak();
  const x=document.getElementById('hsXp'); if(x) x.textContent=DB.xp||0;
}
/* ===================== ARAYÜZ / ROUTER ===================== */
const el=id=>document.getElementById(id);
const app=()=>el('app');
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(t){ const d=document.createElement('div'); d.className='toast'; d.textContent=t; document.body.appendChild(d); setTimeout(()=>d.remove(),2200); }

function ringSVG(pct,size){
  size=size||130; const r=(size-16)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}"><circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}"></circle>
   <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="url(#rg)" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"></circle>
   <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffb000"/><stop offset="100%" stop-color="#ff7a00"/></linearGradient></defs></svg>`;
}
function nextModule(){ const m=MODS.find(x=>DB.scores[x.id]==null); return m?m.id:1; }

function go(view,arg){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===view));
  window.scrollTo(0,0);
  if(view==='home') renderHome();
  else if(view==='modules') renderModules();
  else if(view==='module') openModule(arg);
  else if(view==='exam') renderExam();
  else if(view==='review') renderReview();
  else if(view==='glossary') renderGlossary();
}

function saveName(){ DB.name=el('nameIn').value.trim(); persist(); toast('İsim kaydedildi'); }

/* ---------- MODÜLLER ---------- */
function renderModules(){
  let h=`<div class="sectiontitle"><h2>Tüm Modüller</h2><div class="ln"></div><span class="muted" style="font-size:12.5px">${moduleDone()}/${MODS.length} tamamlandı</span></div>`;
  for(const k of Object.keys(CATS)){
    const ms=MODS.filter(m=>m.cat===k); if(!ms.length) continue;
    h+=`<div class="sectiontitle" style="margin-top:18px"><h2 style="font-size:15px;color:${CATS[k].c}">${CATS[k].n}</h2><div class="ln"></div></div><div class="cards">`;
    for(const m of ms){
      const sc=DB.scores[m.id], dueN=dueReviews().filter(q=>parseQid(q).mod===m.id).length;
      const badge = sc!=null?`<span class="cardbadge done">%${sc}</span>`:(dueN?`<span class="cardbadge due">🔁${dueN}</span>`:'');
      h+=`<div class="card" onclick="go('module',${m.id})">${badge}<div class="ico">${m.ic}</div>
        <div class="cat">Modül ${m.id}</div><h3>${m.t}</h3><p>${m.d}</p>
        <div class="mini"><i style="width:${sc||0}%"></i></div></div>`;
    }
    h+=`</div>`;
  }
  app().innerHTML=h;
}

  app().innerHTML=`<span class="breadcrumb" onclick="go('modules')">← Modüller</span>
   <div class="panel">

     <div id="mtab"></div>

function showTab(id,tab){

   <div class="row" style="margin-top:10px"><button class="btn sm" onclick="saveNote(${id})">Kaydet</button><span id="noteMsg" class="muted" style="font-size:12px"></span></div></div>`;

/* ---------- QUIZ MOTORU (paylaşımlı) ---------- */
let QS=null;
function startQuiz(container, items, srs, finishLabel, onFinish){
  QS={items, picks:{}, checked:false, srs:srs, onFinish:onFinish};
  let h='';
  items.forEach((it,i)=>{
    h+=`<div class="q" id="q${i}"><div class="qtxt">${i+1}. ${it.q}</div>`+
      it.opts.map((o,j)=>`<button class="opt" id="o${i}_${j}" onclick="pick(${i},${j})">${o}</button>`).join('')+
      `<div class="expl" id="e${i}"></div></div>`;
  });
  h+=`<div class="row" style="margin-top:8px"><button class="btn blue" id="qSubmit" onclick="submitQuiz()">${finishLabel||'Cevapları Kontrol Et'}</button></div><div id="qresult"></div>`;
  el(container).innerHTML=h;
}
function pick(i,j){ if(QS.checked) return; QS.picks[i]=j;
  document.querySelectorAll('#q'+i+' .opt').forEach(o=>o.classList.remove('sel'));
  el('o'+i+'_'+j).classList.add('sel'); }
function submitQuiz(){
  if(QS.checked) return; QS.checked=true; let correct=0;
  QS.items.forEach((it,i)=>{
    const p=QS.picks[i];
    el('o'+i+'_'+it.ans).classList.add('correct');
    if(p!=null && p!==it.ans) el('o'+i+'_'+p).classList.add('wrong');
    const ok=p===it.ans; if(ok) correct++;
    const e=el('e'+i); e.className='expl show'; e.innerHTML=(ok?'✔ ':'✗ ')+it.ex;
    if(QS.srs && it.qid) srsAnswer(it.qid, ok);
  });
  const total=QS.items.length, pct=Math.round(correct/total*100);
  const r=el('qresult'); if(r) r.innerHTML=`<div class="panel2" style="margin-top:14px"><div class="row" style="justify-content:space-between"><b>Sonuç</b><b style="font-size:20px;color:var(--acc)">${correct}/${total} · %${pct}</b></div><div class="scorebar" style="margin:8px 0"><i style="width:${pct}%"></i></div></div>`;
  const sb=el('qSubmit'); if(sb) sb.disabled=true;
  markToday(); refreshHeader();
  if(QS.onFinish) QS.onFinish(correct,total,pct);
}
function startModuleQuiz(id){
  const items=QBANK[id].map((x,i)=>Object.assign({qid:id+'.'+i},x));
  startQuiz('mtab', items, true, 'Cevapları Kontrol Et', (c,t,pct)=>{

const GLOSSARY=[

 ["Kontaktör","Bobinle büyük yükü anahtarlayan elektromekanik şalter."],
 ["LDR","Işığa duyarlı direnç (foto direnç)."],
 ["Kompanzasyon","Kondansatörle güç faktörünü (cosφ) düzeltme."],
 ["Güç faktörü (cosφ)","P/S oranı; 1'e yakın olması istenir."],
 ["Görünür/Aktif/Reaktif güç","S (kVA) / P (kW) / Q (kVAR); S²=P²+Q²."],
 ["ATS","Otomatik Transfer Şalteri (şebeke↔jeneratör)."],
 ["UPS","Kesintisiz güç kaynağı; jeneratöre kadar köprüler."],
 ["Parafudur (SPD)","Aşırı gerilimi toprağa akıtan koruma."],
 ["Topraklama direnci","Düşük olmalı; yıldırım korumasında hedef R<1 Ω."],
 ["Faraday kafesi","Örgü ile yapı yüzeyi yıldırım koruması."],
 ["ADP","Ana Dağıtım Panosu."],

 ["Shed water","Dış mekânda yüksüğü yukarı yerleştirme prensibi."],
 ["Yank testi","Bağlantı sonrası teli çekerek sağlamlık kontrolü."],
 ["Periyot / Frekans","T süresi; f = 1/T (Hz)."],
 ["RMS","Etkin değer; Vrms = Vmax/√2."],
 ["Clash detection","Disiplinler arası çakışma tespiti (BIM)."],
];
function renderGlossary(){
  app().innerHTML=`<div class="sectiontitle"><h2>Sözlük & Arama</h2><div class="ln"></div></div>
   <input type="text" id="gsearch" placeholder="Terim veya modül ara... (örn. reaktans, topraklama, RJ45)" oninput="filterGlossary()">
   <div id="gres" style="margin-top:14px"></div>`;
  filterGlossary();
}
function filterGlossary(){
  const q=(el('gsearch').value||'').toLocaleLowerCase('tr');
  const terms=GLOSSARY.filter(t=>!q||t[0].toLocaleLowerCase('tr').includes(q)||t[1].toLocaleLowerCase('tr').includes(q));
  const mods=MODS.filter(m=>q && (m.t.toLocaleLowerCase('tr').includes(q)||(TEORI[m.id]||'').toLocaleLowerCase('tr').includes(q)));
  let h='';
  if(mods.length){ h+=`<div class="muted" style="font-size:12px;margin-bottom:6px">Modüller</div><div class="cards" style="margin-bottom:18px">`+
    mods.map(m=>`<div class="card" onclick="go('module',${m.id})"><div class="ico">${m.ic}</div><div class="cat">Modül ${m.id}</div><h3>${m.t}</h3><p>${m.d}</p></div>`).join('')+`</div>`; }
  h+=`<div class="muted" style="font-size:12px;margin-bottom:6px">Terimler (${terms.length})</div>`;
  h+=terms.map(t=>`<div class="panel2" style="margin:8px 0"><b style="color:var(--acc2)">${t[0]}</b><div style="font-size:13px;margin-top:4px;line-height:1.6">${t[1]}</div></div>`).join('')||'<div class="muted">Sonuç yok.</div>';
  el('gres').innerHTML=h;
}

     <label class="fld">Gerilim V (Volt): <span id="vV">12</span></label><input type="range" id="V" min="0" max="48" value="12" oninput="ohmCalc()">

     <div class="kc"><div class="k"><span>Akım I = V / R</span><b id="vI">2.00 A</b></div><div class="k"><span>Güç P = V × I</span><b id="vP">24.0 W</b></div></div>
   </div>
   <div class="panel2"><b>Görev 1B — Paralel Devre</b>

function ohmCalc(){const V=+el('V').value,R=+el('R').value;el('vV').textContent=V;el('vR').textContent=R;const I=V/R;el('vI').textContent=I.toFixed(2)+' A';el('vP').textContent=(V*I).toFixed(1)+' W';}

function ohmFinish(){const pct=lampsBlown>0?100:70;el('res1').innerHTML=taskDone(1,pct,pct>=100?'ok':'info',pct>=100?'✔ Ohm hesabı ve paralel devre davranışını gözlemledin.':'Paralel kuralı görmek için bir lamba patlat.');}

   </div>${hist}`;
}
function startExam(){
  const pool=[]; for(const mod in QBANK) QBANK[mod].forEach((q,i)=>pool.push(Object.assign({qid:mod+'.'+i},q)));
  shuffle(pool); const items=pool.slice(0,20);
  EX={items, start:Date.now(), dur:15*60, timer:null};
  app().innerHTML=`<div class="panel"><div class="row" style="justify-content:space-between"><h2 style="margin:0">📝 Deneme Sınavı</h2><div class="examtimer" id="examTimer">15:00</div></div><div id="examBody" style="margin-top:12px"></div></div>`;
  startQuiz('examBody', items, true, 'Sınavı Bitir', examFinish);
  EX.timer=setInterval(tickExam,1000);
}
function tickExam(){
  if(!EX) return;
  const left=EX.dur-Math.floor((Date.now()-EX.start)/1000);
  const t=el('examTimer'); if(!t){clearInterval(EX.timer);return;}
  if(left<=0){ clearInterval(EX.timer); t.textContent='00:00'; if(QS && !QS.checked) submitQuiz(); return; }
  t.textContent=fmt(left); if(left<=60) t.style.color='var(--bad)';
}
function examFinish(c,t,pct){
  if(EX&&EX.timer) clearInterval(EX.timer);
  const pass=pct>=70;
  DB.exams.unshift({date:todayStr(),correct:c,total:t,pct,pass}); DB.exams=DB.exams.slice(0,20); persist();
  addXp(c*3); markToday(); refreshHeader();
  let out=`<div class="panel2" style="margin-top:14px;border-left:4px solid ${pass?'var(--ok)':'var(--bad)'}"><b style="font-size:16px">${pass?'🎉 Tebrikler, geçtin!':'Bu sefer olmadı — tekrar dene.'}</b> · %${pct} (${c}/${t})</div>`;
  if(pass) out+=certHTML(pct);
  out+=`<div class="row" style="margin-top:12px"><button class="btn" onclick="go('exam')">↻ Tekrar dene</button><button class="btn ghost" onclick="go('review')">Yanlışları tekrar et</button><button class="btn ghost" onclick="go('home')">Pano</button></div>`;
  const r=el('qresult'); if(r) r.insertAdjacentHTML('beforeend', out);
}

24:`Transformatör elektromanyetik indüksiyonla gerilim seviyesini değiştirir (yalnız AC; DA'da çalışmaz çünkü değişken akı gerekir).<br><b>Dönüştürme oranı:</b> N1/N2 = V1/V2 = I2/I1. N2&gt;N1 → yükseltici, N2&lt;N1 → düşürücü.<br>İdeal trafoda güç korunur (S1≈S2). <b>Kayıplar:</b> bakır (I²R) + demir (histerezis/girdap). Soğutmaya göre yağlı/kuru. Üç fazda yıldız (Y) / üçgen (Δ) bağlantı.`,
25:`<b>Asenkron (endüksiyon) motor</b> en yaygındır: sağlam, ucuz, az bakım. <b>Senkron motor</b> sabit hızda döner, kompanzasyona yardımcı olur. <b>DA motor</b> kolay hız kontrolü sağlar.<br>Senkron hız: <b>n = 120·f / p</b> (p: kutup sayısı). Yol alma akımını düşürmek için <b>yıldız-üçgen</b> yol verme, soft starter veya sürücü (VFD) kullanılır.`,
26:`<b>Topraklama sistemleri</b> (1. harf kaynak, 2. harf gövde): TN-S (N ve PE ayrı), TN-C-S (önce birleşik sonra ayrık), TT (gövde ayrı topraklayıcı), IT (kaynak izole).<br><b>Kaçak akım rölesi (RCD/FI):</b> faz-nötr akım farkını ölçer; <b>30 mA can güvenliği</b>, ~300 mA yangın koruması. Eşpotansiyel baralama dokunma gerilimini azaltır.`,
27:`<b>Aşırı akım koruması:</b> sigorta/otomat. Açma eğrileri: <b>B 3–5·In</b> (aydınlatma), <b>C 5–10·In</b> (priz/motor), <b>D 10–20·In</b> (yüksek başlangıç akımı).<br><b>Seçicilik:</b> arıza en yakın koruma elemanında temizlenmeli, üst kademe açmamalı. Kısa devre akımı, kesicinin kesme kapasitesinden (kA) küçük olmalı.<br><b>Gerilim düşümü:</b> aydınlatmada ≤%3, kuvvette ≤%5; hat uzunluğu ve akımla artar.`,
28:`<b>Işık akısı:</b> lümen (lm). <b>Aydınlık düzeyi:</b> lüks (lx = lm/m²). <b>Armatür verimi:</b> lm/W (LED en verimli).<br>Lümen yöntemi: E = (Φ·n·η·d) / A. Önerilen düzeyler: ofis ~500 lx, koridor ~100 lx, hassas iş ~750–1000 lx. Konfor için renk sıcaklığı (K) ve renksel geriverim (CRI/Ra) önemlidir.`,
29:`Temel düzenlemeler: <b>Elektrik İç Tesisleri Yönetmeliği</b>, Elektrik Tesislerinde Topraklamalar Yönetmeliği, Elektrik Kuvvetli Akım Tesisleri Yönetmeliği, İSG mevzuatı; havacılıkta <b>SHT/HES</b> kuralları.<br>Yetkisiz müdahale yasaktır. Çalışma öncesi <b>5 altın kural</b>, KKD (baret, yalıtkan eldiven/ayakkabı), iş izni ve <b>etiket-kilit (LOTO)</b> zorunludur.`
});
Object.assign(FOY,{
24:`<b>Özet:</b> Trafo AC gerilimini indüksiyonla dönüştürür.<br><b>Oran:</b> N1/N2 = V1/V2 = I2/I1. Gerilim artarsa akım düşer (güç sabit).<br>Örn. N1=1000, N2=100, V1=220 V → V2 = 220·(100/1000) = 22 V (düşürücü).<br><b>Kayıplar:</b> bakır (sargı, I²R) + demir (nüve: histerezis+girdap akımı).<br><b>DA'da çalışmaz:</b> sabit akı indüksiyon üretmez.`,
25:`<b>Asenkron motor:</b> en yaygın; sağlam, ucuz.<br><b>Senkron hız:</b> n=120·f/p. Örn. f=50 Hz, p=4 → n=1500 d/d.<br><b>Yıldız-üçgen:</b> yolverme akımını düşürür (önce yıldız, sonra üçgen).<br><b>VFD/sürücü:</b> hızı kademesiz ayarlar.<br><b>Senkron motor</b> ayrıca güç faktörü düzeltir.`,

/* M24 TRAFO */
function modTrafo(m){
  el('mtab').innerHTML=`<div class="panel2"><b>Görev 24A — Trafo Hesaplayıcı</b>
   <label class="fld">Primer sarım N1: <span id="n1V">1000</span></label><input type="range" id="n1" min="100" max="2000" step="50" value="1000" oninput="trafoCalc()">
   <label class="fld">Sekonder sarım N2: <span id="n2V">500</span></label><input type="range" id="n2" min="50" max="2000" step="50" value="500" oninput="trafoCalc()">
   <label class="fld">Primer gerilim V1 (V): <span id="v1V">220</span></label><input type="range" id="v1" min="12" max="380" step="2" value="220" oninput="trafoCalc()">
   <div class="kc"><div class="k"><span>Sekonder V2</span><b id="v2V">—</b></div><div class="k"><span>Oran N1/N2</span><b id="orV">—</b></div><div class="k"><span>Tip</span><b id="tpV">—</b></div></div></div>
   <div class="panel2"><b>Görev 24B — Hesapla</b><div class="muted" style="font-size:12px;margin:4px 0">N1=1000, N2=100, V1=220 V → Sekonder V2 = ? (V)</div>
   <input type="number" id="tans" class="inline" style="width:120px" placeholder="V"><button class="btn blue sm" style="margin-left:8px" onclick="trafoCheck()">Kontrol</button></div><div id="res24"></div>`;
  trafoCalc();
}
function trafoCalc(){const n1=+el('n1').value,n2=+el('n2').value,v1=+el('v1').value,v2=v1*n2/n1;el('n1V').textContent=n1;el('n2V').textContent=n2;el('v1V').textContent=v1;el('v2V').textContent=v2.toFixed(1)+' V';el('orV').textContent=(n1/n2).toFixed(2);el('tpV').textContent=n2>n1?'Yükseltici':(n2<n1?'Düşürücü':'1:1');}
function trafoCheck(){const b=220*100/1000,ok=Math.abs(+el('tans').value-b)<0.5;el('res24').innerHTML=taskDone(24,ok?100:40,ok?'ok':'bad',ok?`✔ V2 = V1·N2/N1 = 220·100/1000 = ${b} V (düşürücü).`:`✗ V2 = V1·N2/N1 = 220·100/1000 = ${b} V olmalı.`);}

/* M28 AYDINLATMA */
function modLux(m){
  el('mtab').innerHTML=`<div class="panel2"><b>Görev 28 — Aydınlatma Hesabı (lümen yöntemi)</b>
   <div class="muted" style="font-size:12px;margin:4px 0">Hedef: Ofisi ~500 lx aydınlat. E = Φ·n·η·d / A (η=0,6 · d=0,8)</div>
   <label class="fld">Armatür sayısı n: <span id="lnV">10</span></label><input type="range" id="ln" min="1" max="40" value="10" oninput="luxCalc()">
   <label class="fld">Armatür başına lümen Φ: <span id="lfV">4000</span></label><input type="range" id="lf" min="1000" max="6000" step="100" value="4000" oninput="luxCalc()">
   <label class="fld">Oda alanı A (m²): <span id="laV">40</span></label><input type="range" id="la" min="10" max="200" value="40" oninput="luxCalc()">
   <div class="kc"><div class="k"><span>Aydınlık E</span><b id="leV">—</b></div><div class="k"><span>Ofis hedefi 500 lx</span><b id="ltV">—</b></div></div>
   <button class="btn blue sm" style="margin-top:10px" onclick="luxFinish()">Değerlendir</button></div><div id="res28"></div>`;
  luxCalc();
}
function luxCalc(){const n=+el('ln').value,f=+el('lf').value,a=+el('la').value,E=n*f*0.6*0.8/a;el('lnV').textContent=n;el('lfV').textContent=f;el('laV').textContent=a;el('leV').textContent=Math.round(E)+' lx';el('ltV').textContent=E>=500?'Yeterli ✔':'Yetersiz';return E;}
function luxFinish(){const E=luxCalc();const pct=(E>=450&&E<=900)?100:(E>=300?60:30);el('res28').innerHTML=taskDone(28,pct,pct>=100?'ok':'info',`Aydınlık ≈ ${Math.round(E)} lx. ${pct>=100?'Hedef sağlandı (aşırı parlama da yok).':(E<500?'500 lx için armatür veya lümeni artır.':'500 lx üstü ama fazla; dengele.')}`);}

/* SORU KARIŞTIRMA — quiz/sınav/tekrar yeniden tanımlanır */
function shuffleItems(items){return shuffle(items.map(it=>{const idx=it.opts.map((_,i)=>i);shuffle(idx);return Object.assign({},it,{opts:idx.map(i=>it.opts[i]),ans:idx.indexOf(it.ans)});}));}
function startModuleQuiz(id){const items=shuffleItems(QBANK[id].map((x,i)=>Object.assign({qid:id+'.'+i},x)));startQuiz('mtab',items,true,'Cevapları Kontrol Et',(c,t,pct)=>{setScore(id,pct);addXp(c*2);el('qresult').innerHTML+=`<div class="row" style="margin-top:12px"><button class="btn sm" onclick="showTab(${id},'foy')">📘 Föy ile pekiştir</button><button class="btn ghost sm" onclick="startModuleQuiz(${id})">↻ Tekrar çöz</button></div>`;});}
function startExam(){const pool=[];for(const mod in QBANK)QBANK[mod].forEach((q,i)=>pool.push(Object.assign({qid:mod+'.'+i},q)));const items=shuffleItems(pool).slice(0,20);EX={items,start:Date.now(),dur:15*60,timer:null};app().innerHTML=`<div class="panel"><div class="row" style="justify-content:space-between"><h2 style="margin:0">📝 Deneme Sınavı</h2><div class="examtimer" id="examTimer">15:00</div></div><div id="examBody" style="margin-top:12px"></div></div>`;startQuiz('examBody',items,true,'Sınavı Bitir',examFinish);EX.timer=setInterval(tickExam,1000);}
function renderReview(){const due=dueReviews();if(!due.length){app().innerHTML=`<div class="panel"><h2 style="margin:0">🔁 Tekrar</h2><div class="muted" style="font-size:13px;margin-top:8px">Bugün tekrar edilecek soru yok 🎉<br>Quiz çözdükçe yanlış cevapların aralıklı tekrar (spaced repetition) ile zamanı gelince burada belirir.</div><button class="btn" style="margin-top:14px" onclick="go('modules')">Modüllere git</button></div>`;return;}const items=shuffleItems(due.slice(0,20).map(qid=>{const p=parseQid(qid);return Object.assign({qid},QBANK[p.mod][p.idx]);}));app().innerHTML=`<div class="panel"><h2 style="margin:0">🔁 Tekrar — ${items.length} soru</h2><div class="muted" style="font-size:13px;margin-top:6px">Zamanı gelen tekrar soruları. Doğru bildiklerin uzar, yanlışlar yakında tekrar gelir.</div><div id="revBody" style="margin-top:14px"></div></div>`;startQuiz('revBody',items,true,'Tekrarı Bitir',(c,t,pct)=>{addXp(c);const r=el('qresult');if(r)r.insertAdjacentHTML('beforeend',`<div class="row" style="margin-top:12px"><button class="btn" onclick="go('review')">↻ Kalan tekrarlar</button><button class="btn ghost" onclick="go('home')">Pano</button></div>`);});}

/* YEDEKLEME / GERİ YÜKLEME / SIFIRLAMA + AYARLAR */
function exportData(){try{const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='elkmaster-yedek-'+todayStr()+'.json';document.body.appendChild(a);a.click();a.remove();toast('Yedek indirildi');}catch(e){toast('Yedek alınamadı');}}
function importData(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);DB=Object.assign({scores:{},notes:{},srs:{},exams:[],days:[],name:'',xp:0},o);persist();refreshHeader();toast('Yedek geri yüklendi');go('home');}catch(e){toast('Geçersiz dosya');}};r.readAsText(f);}
function resetData(){if(!confirm('Tüm ilerlemen kalıcı olarak silinecek. Emin misin?'))return;DB={scores:{},notes:{},srs:{},exams:[],days:[],name:'',xp:0};persist();refreshHeader();toast('İlerleme sıfırlandı');go('home');}
function renderSettings(){app().innerHTML=`<div class="panel"><h2 style="margin:0">⚙️ Veri & Ayarlar</h2>
 <div class="muted" style="font-size:13px;margin-top:8px">İlerlemen bu cihazın tarayıcısında saklanır. Başka cihaza taşımak veya veri kaybetmemek için düzenli yedek al.</div>

 <label class="btn ghost" style="cursor:pointer">⬆️ Geri Yükle<input type="file" accept="application/json,.json" style="display:none" onchange="importData(this)"></label>
 <button class="btn danger" onclick="resetData()">🗑️ İlerlemeyi Sıfırla</button></div>
 <div class="panel2" style="margin-top:16px"><b>Mevcut Durum</b><div class="muted" style="font-size:12.5px;margin-top:6px">Tamamlanan: ${moduleDone()}/${MODS.length} modül · Ortalama: %${avgScore()} · XP: ${DB.xp||0} · Seri: ${streak()} gün · Tekrar bekleyen: ${dueReviews().length} · Sınav denemesi: ${DB.exams.length}</div></div></div>`;}
function go(view,arg){document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===view));window.scrollTo(0,0);if(view==='home')renderHome();else if(view==='modules')renderModules();else if(view==='module')openModule(arg);else if(view==='exam')renderExam();else if(view==='review')renderReview();else if(view==='glossary')renderGlossary();else if(view==='settings')renderSettings();}

/* showTab yeniden tanımlanır — Teori sekmesi fasikül düzeni + şekil */
function showTab(id,tab){
  const m=modById(id);
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.t===tab));
  const c=el('mtab');
  if(tab==='teori'){
    c.innerHTML=`<div class="lesson">
      <div class="lessonhead" style="border-left-color:${CATS[m.cat].c}">
        <div class="lh-ic">${m.ic}</div>
        <div><div class="lh-cat" style="color:${CATS[m.cat].c}">${CATS[m.cat].n}</div>
        <div class="lh-t">Fasikül ${m.id} — ${m.t}</div></div></div>
      ${figureFor(id)}
      <div class="edu">${TEORI[id]||''}</div>
      <div class="row" style="margin-top:14px">${m.task?`<button class="btn" onclick="showTab(${id},'uygulama')">🎯 Uygulama</button>`:''}<button class="btn blue" onclick="showTab(${id},'quiz')">📝 Quiz çöz</button><button class="btn ghost" onclick="showTab(${id},'foy')">📘 Föy</button></div>
    </div>`;
  }
  else if(tab==='foy') c.innerHTML=`<details class="foy" open><summary>📘 Detaylı Anlatım — Föy</summary><div style="margin-top:10px">${FOY[id]||''}</div></details>`;
  else if(tab==='not') c.innerHTML=noteHTML(id);
  else if(tab==='quiz') startModuleQuiz(id);
  else if(tab==='uygulama'){ if(m.task && window[m.task]) window[m.task](m); else c.innerHTML='<div class="muted">Bu modülde interaktif uygulama yok.</div>'; }
}

let MK=null;
function startMyk(level){
  const thr=level===4?80:70;
  const pool=[]; MYK_Q.isg.forEach((q,i)=>pool.push(Object.assign({qid:'myk.isg.'+i},q))); MYK_Q.meslek.forEach((q,i)=>pool.push(Object.assign({qid:'myk.meslek.'+i},q)));
  const items=shuffleItems(pool).slice(0,25);
  MK={items,level,thr,start:Date.now(),dur:50*60,timer:null};
  app().innerHTML=`<div class="panel"><div class="row" style="justify-content:space-between"><h2 style="margin:0">🎖️ MYK Deneme — Seviye ${level}</h2><div class="examtimer" id="mykTimer">50:00</div></div>
     <div class="muted" style="font-size:12px;margin-top:4px">25 soru · geçme ≥ %${thr} · yanlış doğruyu götürmez</div>
     <div id="mykBody" style="margin-top:12px"></div></div>`;
  startQuiz('mykBody',items,false,'Sınavı Bitir',mykFinish);
  MK.timer=setInterval(mykTick,1000);
}

function mykFinish(c,t,pct){

   <div class="outrow"><div class="sp64"></div><div class="sp74"></div><div class="sp92"></div>${outs}</div>`;
}
function panoTog(part,i){ if(part==='main')PB.main=!PB.main; else if(part==='rcd')PB.rcd=!PB.rcd; else if(part==='mcb')PB.mcb[i]=!PB.mcb[i]; panoRender(); }
function panoVolt(v){ PB.volt=+v; el('pvV').textContent=v; PB.vp=!(PB.volt<195||PB.volt>253);
  showMsg('panoMsg',PB.vp?'info':'bad',PB.vp?`Gerilim ${v} V — normal aralık (195–253 V).`:`⚠ Gerilim ${v} V — voltaj koruma rölesi enerjiyi KESTİ. Cihazlar korunuyor.`); panoRender(); }
function panoFault(){ PB.rcd=false; showMsg('panoMsg','bad','⚡ Kaçak akım algılandı! RCD (30 mA) açtı ve tüm hattı kesti → bu, insanı çarpılmaktan korur. Tekrar enerji için RCD\'ye tıkla.'); panoRender(); }
function panoEval(){ const liveN=PB.mcb.filter((x,i)=>circuitLive(i)).length; const ok=PB.main&&PB.rcd&&PB.vp&&liveN>=2;
  el('res34').innerHTML=taskDone(34, ok?100:50, ok?'ok':'info', ok?`✔ Pano enerjili: ana şalter + RCD + voltaj koruma açık, ${liveN} devre besleniyor. Gerçekçi panoyu kurdun!`:'Ana şalteri ve RCD\'yi aç, gerilimi 195–253 V aralığında tut ve en az 2 MCB\'yi enerjilendir.'); }


refreshHeader();
go('home');

</script>
